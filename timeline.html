<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavoirsFR · Frise chronologique</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0F172A;font-family:'Inter',sans-serif;padding:40px 20px;color:#F1F5F9}
        .container{max-width:1000px;margin:0 auto}
        h1{color:#F59E0B;text-align:center;margin-bottom:10px}
        .sub{text-align:center;color:#94A3B8;margin-bottom:30px}
        .timeline{position:relative;padding:20px 0}
        .timeline::before{content:'';position:absolute;left:50%;transform:translateX(-50%);width:4px;height:100%;background:#F59E0B;border-radius:2px}
        .timeline-item{position:relative;width:50%;padding:20px 40px;cursor:pointer}
        .timeline-item:nth-child(odd){left:0;text-align:right}
        .timeline-item:nth-child(even){left:50%;text-align:left}
        .timeline-item::before{content:'';position:absolute;top:50%;transform:translateY(-50%);width:16px;height:16px;background:#F59E0B;border-radius:50%;border:3px solid #0F172A;z-index:1}
        .timeline-item:nth-child(odd)::before{right:-8px}
        .timeline-item:nth-child(even)::before{left:-8px}
        .timeline-content{background:#1E293B;border-radius:16px;padding:20px;border-left:4px solid #F59E0B;transition:.2s}
        .timeline-content:hover{background:#334155;transform:translateY(-4px)}
        .timeline-date{color:#F59E0B;font-weight:700;margin-bottom:8px}
        .timeline-title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
        .timeline-desc{color:#94A3B8;font-size:0.85rem;line-height:1.5}
        .back-link{display:inline-block;background:#F59E0B;color:#0F172A;text-decoration:none;padding:10px 24px;border-radius:40px;margin-bottom:20px;font-weight:600;transition:.2s}
        .back-link:hover{background:#D97706;transform:translateX(-4px)}
        .back-link i{margin-right:8px}
        @media(max-width:768px){
            .timeline::before{left:20px}
            .timeline-item{width:100%;padding-left:50px;text-align:left}
            .timeline-item:nth-child(odd){left:0;text-align:left}
            .timeline-item:nth-child(even){left:0}
            .timeline-item:nth-child(odd)::before,
            .timeline-item:nth-child(even)::before{left:12px;right:auto}
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au menu principal</a>
    <h1><i class="fas fa-timeline"></i> Frise chronologique mondiale</h1>
    <div class="sub">Les grandes dates de l'histoire</div>
    <div class="timeline" id="timeline"></div>
</div>
<script>
    const events = [
        { date: "-476", title: "Chute de l'Empire romain", desc: "Fin de l'Antiquité, début du Moyen Âge." },
        { date: "800", title: "Sacre de Charlemagne", desc: "Charlemagne est couronné empereur d'Occident." },
        { date: "1095", title: "Appel de la croisade", desc: "Urbain II lance la première croisade à Clermont." },
        { date: "1337", title: "Début de la guerre de Cent Ans", desc: "Conflit entre la France et l'Angleterre." },
        { date: "1431", title: "Jeanne d'Arc brûlée à Rouen", desc: "L'héroïne française meurt sur le bûcher." },
        { date: "1492", title: "Découverte de l'Amérique", desc: "Christophe Colomb atteint le Nouveau Monde." },
        { date: "1515", title: "Bataille de Marignan", desc: "Victoire de François Ier." },
        { date: "1598", title: "Édit de Nantes", desc: "Henri IV accorde la liberté de culte aux protestants." },
        { date: "1682", title: "Versailles, capitale du royaume", desc: "Louis XIV installe la cour à Versailles." },
        { date: "1789", title: "Révolution française", desc: "Prise de la Bastille, Déclaration des droits de l'homme." },
        { date: "1799", title: "Coup d'État de Napoléon", desc: "Bonaparte devient Premier Consul." },
        { date: "1804", title: "Napoléon sacré empereur", desc: "Couronnement à Notre-Dame de Paris." },
        { date: "1815", title: "Bataille de Waterloo", desc: "Défaite finale de Napoléon." },
        { date: "1914", title: "Première Guerre mondiale", desc: "L'Europe s'embrase. 16 millions de morts." },
        { date: "1939", title: "Seconde Guerre mondiale", desc: "Conflit planétaire, 70 millions de morts." },
        { date: "1944", title: "Débarquement de Normandie", desc: "Libération de l'Europe occupée." },
        { date: "1945", title: "Création de l'ONU", desc: "Organisation des Nations unies pour la paix." },
        { date: "1957", title: "Traité de Rome", desc: "Naissance de la Communauté économique européenne." },
        { date: "1989", title: "Chute du mur de Berlin", desc: "Fin de la guerre froide." },
        { date: "2024", title: "Jeux Olympiques à Paris", desc: "La France accueille les JO pour la troisième fois." }
    ];
    let html = '';
    events.forEach(event => {
        html += '<div class="timeline-item">';
        html += '<div class="timeline-content">';
        html += '<div class="timeline-date">📅 ' + event.date + '</div>';
        html += '<div class="timeline-title">' + event.title + '</div>';
        html += '<div class="timeline-desc">' + event.desc + '</div>';
        html += '</div></div>';
    });
    document.getElementById('timeline').innerHTML = html;
</script>
</body>
</html>
