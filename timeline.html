<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavoirsFR · Frise chronologique interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F172A;
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            color: #F1F5F9;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .back-btn {
            background: #F59E0B;
            color: #0F172A;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .back-btn:hover {
            background: #D97706;
            transform: translateX(-4px);
        }

        h1 {
            color: #F59E0B;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #94A3B8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* FILTRES PAR CATÉGORIE */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: #1E293B;
            border: 2px solid #334155;
            color: #94A3B8;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            border-color: #F59E0B;
            color: #F1F5F9;
        }

        .filter-btn.active {
            background: #F59E0B;
            border-color: #F59E0B;
            color: #0F172A;
            font-weight: 600;
        }

        /* TIMELINE */
        .timeline-wrapper {
            position: relative;
            padding: 20px 0;
        }

        .timeline-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #F59E0B, #D97706);
            transform: translateX(-50%);
            border-radius: 4px;
        }

        .timeline-item {
            position: relative;
            width: 50%;
            padding: 20px 40px;
            cursor: pointer;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }

        .timeline-item:hover {
            transform: scale(1.02);
        }

        .timeline-item:nth-child(odd) {
            left: 0;
            text-align: right;
            padding-right: 50px;
        }

        .timeline-item:nth-child(even) {
            left: 50%;
            text-align: left;
            padding-left: 50px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            background: #F59E0B;
            border-radius: 50%;
            border: 3px solid #0F172A;
            z-index: 1;
            box-shadow: 0 0 0 4px #F59E0B40;
            transition: all 0.3s;
        }

        .timeline-item:hover::before {
            box-shadow: 0 0 0 8px #F59E0B40;
            transform: translateY(-50%) scale(1.1);
        }

        .timeline-item:nth-child(odd)::before {
            right: -9px;
        }

        .timeline-item:nth-child(even)::before {
            left: -9px;
        }

        .timeline-content {
            background: #1E293B;
            border-radius: 20px;
            padding: 20px 24px;
            border-left: 4px solid #F59E0B;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .timeline-item:hover .timeline-content {
            background: #2D3A5E;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px -10px rgba(245, 158, 11, 0.2);
        }

        .timeline-date {
            color: #F59E0B;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .timeline-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #F1F5F9;
        }

        .timeline-desc {
            color: #94A3B8;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .timeline-category {
            display: inline-block;
            background: #334155;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #94A3B8;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94A3B8;
        }

        .empty-state i {
            font-size: 3rem;
            color: #334155;
            margin-bottom: 16px;
        }

        .count-badge {
            display: inline-block;
            background: #F59E0B20;
            color: #F59E0B;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .timeline-item {
                width: 100%;
                padding: 16px 20px !important;
                text-align: left !important;
                left: 0 !important;
            }

            .timeline-item::before {
                left: 12px !important;
                right: auto !important;
            }

            .timeline-line {
                left: 20px;
            }

            .timeline-item:nth-child(odd) {
                padding-left: 40px !important;
            }

            .timeline-item:nth-child(even) {
                padding-left: 40px !important;
            }

            .filter-bar {
                gap: 8px;
            }

            .filter-btn {
                font-size: 0.8rem;
                padding: 6px 14px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 12px;
            }
            .timeline-content {
                padding: 14px 16px;
            }
            .timeline-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Retour au menu</button>

    <h1>📅 Frise chronologique</h1>
    <div class="sub">Explorez l'histoire par thème — Cliquez sur une catégorie pour filtrer</div>

    <!-- Filtres -->
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all">🌍 Tous</button>
        <button class="filter-btn" data-filter="Histoire">📜 Histoire</button>
        <button class="filter-btn" data-filter="Sciences">🔬 Sciences</button>
        <button class="filter-btn" data-filter="Arts">🎨 Arts</button>
        <button class="filter-btn" data-filter="Musique">🎵 Musique</button>
        <button class="filter-btn" data-filter="Littérature">📖 Littérature</button>
        <button class="filter-btn" data-filter="Philosophie">💭 Philosophie</button>
        <button class="filter-btn" data-filter="Technologie">💻 Technologie</button>
        <button class="filter-btn" data-filter="Religion">⛪ Religion</button>
    </div>

    <div id="timelineContainer" class="timeline-wrapper">
        <div class="timeline-line"></div>
    </div>
</div>

<script>
    // ==================== ÉVÉNEMENTS DE LA FRISE ====================

        // HISTOIRE

        { date: "1095", title: "Appel de la croisade", desc: "Urbain II lance la première croisade à Clermont.", categorie: "Histoire" },
        { date: "1337", title: "Début de la guerre de Cent Ans", desc: "Conflit entre la France et l'Angleterre.", categorie: "Histoire" },
        { date: "1431", title: "Jeanne d'Arc brûlée à Rouen", desc: "L'héroïne française meurt sur le bûcher.", categorie: "Histoire" },
        { date: "1492", title: "Découverte de l'Amérique", desc: "Christophe Colomb atteint le Nouveau Monde.", categorie: "Histoire" },
        { date: "1515", title: "Bataille de Marignan", desc: "Victoire de François Ier, début de la Renaissance française.", categorie: "Histoire" },
        { date: "1598", title: "Édit de Nantes", desc: "Henri IV accorde la liberté de culte aux protestants.", categorie: "Histoire" },
        { date: "1682", title: "Versailles, capitale du royaume", desc: "Louis XIV installe la cour à Versailles.", categorie: "Histoire" },
        { date: "1789", title: "Révolution française", desc: "Prise de la Bastille, Déclaration des droits de l'homme.", categorie: "Histoire" },
        { date: "1799", title: "Coup d'État de Napoléon", desc: "Bonaparte devient Premier Consul.", categorie: "Histoire" },
        { date: "1804", title: "Napoléon sacré empereur", desc: "Couronnement à Notre-Dame de Paris.", categorie: "Histoire" },
        { date: "1815", title: "Bataille de Waterloo", desc: "Défaite finale de Napoléon.", categorie: "Histoire" },
        { date: "1914", title: "Première Guerre mondiale", desc: "L'Europe s'embrase. 16 millions de morts.", categorie: "Histoire" },
        { date: "1939", title: "Seconde Guerre mondiale", desc: "Conflit planétaire, 70 millions de morts.", categorie: "Histoire" },
        { date: "1944", title: "Débarquement de Normandie", desc: "Libération de l'Europe occupée.", categorie: "Histoire" },
        { date: "1945", title: "Création de l'ONU", desc: "Organisation des Nations unies pour la paix.", categorie: "Histoire" },
        { date: "1957", title: "Traité de Rome", desc: "Naissance de la Communauté économique européenne.", categorie: "Histoire" },
        { date: "1989", title: "Chute du mur de Berlin", desc: "Fin de la guerre froide, réunification allemande.", categorie: "Histoire" },
        { date: "2024", title: "Jeux Olympiques à Paris", desc: "La France accueille les JO pour la troisième fois.", categorie: "Histoire" },

        // SCIENCES
        { date: "1543", title: "De revolutionibus de Copernic", desc: "Copernic propose le système héliocentrique.", categorie: "Sciences" },
        { date: "1687", title: "Principia de Newton", desc: "Newton publie sa théorie de la gravitation.", categorie: "Sciences" },
        { date: "1859", title: "L'Origine des espèces de Darwin", desc: "Darwin présente sa théorie de l'évolution.", categorie: "Sciences" },
        { date: "1896", title: "Découverte de la radioactivité", desc: "Henri Becquerel découvre la radioactivité.", categorie: "Sciences" },
        { date: "1905", title: "Théorie de la relativité", desc: "Einstein publie sa théorie de la relativité restreinte.", categorie: "Sciences" },
        { date: "1928", title: "Découverte de la pénicilline", desc: "Alexander Fleming découvre la pénicilline.", categorie: "Sciences" },
        { date: "1953", title: "Structure de l'ADN", desc: "Watson et Crick décrivent la double hélice de l'ADN.", categorie: "Sciences" },
        { date: "1969", title: "Premier homme sur la Lune", desc: "Apollo 11, Neil Armstrong marche sur la Lune.", categorie: "Sciences" },
        { date: "1990", title: "Naissance du World Wide Web", desc: "Tim Berners-Lee invente le Web.", categorie: "Sciences" },

        // ARTS
        { date: "1503", title: "La Joconde de Léonard de Vinci", desc: "Léonard de Vinci peint la Joconde.", categorie: "Arts" },
        { date: "1872", title: "Impression, soleil levant de Monet", desc: "Monet peint le tableau qui donne son nom à l'impressionnisme.", categorie: "Arts" },
        { date: "1907", title: "Les Demoiselles d'Avignon", desc: "Picasso révolutionne l'art avec le cubisme.", categorie: "Arts" },
        { date: "1937", title: "Guernica de Picasso", desc: "Picasso peint Guernica, dénonçant la guerre.", categorie: "Arts" },
        { date: "1962", title: "Campbell's Soup Cans de Warhol", desc: "Andy Warhol lance le pop art.", categorie: "Arts" },

        // MUSIQUE
        { date: "1721", title: "Les Quatre Saisons de Vivaldi", desc: "Vivaldi compose son œuvre la plus célèbre.", categorie: "Musique" },
        { date: "1824", title: "9e Symphonie de Beethoven", desc: "Beethoven compose sa 9e Symphonie.", categorie: "Musique" },
        { date: "1956", title: "Heartbreak Hotel d'Elvis Presley", desc: "Elvis Presley devient le roi du rock.", categorie: "Musique" },
        { date: "1975", title: "Bohemian Rhapsody de Queen", desc: "Queen sort Bohemian Rhapsody.", categorie: "Musique" },
        { date: "1997", title: "Céline Dion - My Heart Will Go On", desc: "Céline Dion chante pour le film Titanic.", categorie: "Musique" },

        // LITTÉRATURE
        { date: "1605", title: "Don Quichotte de Cervantes", desc: "Cervantes publie Don Quichotte.", categorie: "Littérature" },
        { date: "1862", title: "Les Misérables de Victor Hugo", desc: "Victor Hugo publie Les Misérables.", categorie: "Littérature" },
        { date: "1913", title: "À la recherche du temps perdu", desc: "Proust commence sa grande œuvre.", categorie: "Littérature" },
        { date: "1942", title: "L'Étranger d'Albert Camus", desc: "Albert Camus publie L'Étranger.", categorie: "Littérature" },
        { date: "1943", title: "Le Petit Prince de Saint-Exupéry", desc: "Saint-Exupéry publie Le Petit Prince.", categorie: "Littérature" },

        // PHILOSOPHIE
        { date: "-399", title: "Condamnation de Socrate", desc: "Socrate est condamné à mort par les Athéniens.", categorie: "Philosophie" },
        { date: "-387", title: "Fondation de l'Académie de Platon", desc: "Platon fonde l'Académie à Athènes.", categorie: "Philosophie" },
        { date: "-335", title: "Fondation du Lycée d'Aristote", desc: "Aristote fonde le Lycée à Athènes.", categorie: "Philosophie" },
        { date: "1637", title: "Discours de la méthode de Descartes", desc: "Descartes publie son Discours de la méthode.", categorie: "Philosophie" },
        { date: "1943", title: "L'Être et le Néant de Sartre", desc: "Sartre publie L'Être et le Néant.", categorie: "Philosophie" },

        // TECHNOLOGIE
        { date: "1941", title: "Enigma et Alan Turing", desc: "Alan Turing décrypte la machine Enigma.", categorie: "Technologie" },
        { date: "1981", title: "IBM PC", desc: "IBM lance le premier ordinateur personnel.", categorie: "Technologie" },
        { date: "1984", title: "Macintosh d'Apple", desc: "Apple lance le Macintosh avec interface graphique.", categorie: "Technologie" },
        { date: "1989", title: "Invention du World Wide Web", desc: "Tim Berners-Lee invente le Web au CERN.", categorie: "Technologie" },
        { date: "2007", title: "Premier iPhone", desc: "Apple lance le premier iPhone, révolutionnant la téléphonie.", categorie: "Technologie" },

        // RELIGION
        { date: "-1250", title: "Exode des Hébreux", desc: "Moisès guide les Hébreux hors d'Égypte.", categorie: "Religion" },
        { date: "-5", title: "Naissance de Jésus", desc: "Jésus-Christ naît à Bethléem.", categorie: "Religion" },
        { date: "570", title: "Naissance de Mahomet", desc: "Mahomet naît à La Mecque.", categorie: "Religion" },
        { date: "622", title: "Hégire de Mahomet", desc: "Mahomet s'exile de La Mecque à Médine.", categorie: "Religion" },
        { date: "1099", title: "Prise de Jérusalem", desc: "Les croisés prennent Jérusalem.", categorie: "Religion" }
    ];

    // ==================== LOGIQUE ====================
    let currentFilter = 'all';

    function renderTimeline(filter = 'all') {
        const container = document.getElementById('timelineContainer');
        const filtered = filter === 'all' ? ALL_EVENTS : ALL_EVENTS.filter(e => e.categorie === filter);

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <p>Aucun événement trouvé pour cette catégorie.</p>
                </div>
            `;
            return;
        }

        // Trier par date
        const sorted = [...filtered].sort((a, b) => {
            const numA = parseInt(a.date);
            const numB = parseInt(b.date);
            return numA - numB;
        });

        let html = `<div class="timeline-line"></div>`;
        sorted.forEach((event, index) => {
            const odd = index % 2 === 0;
            html += `
                <div class="timeline-item ${odd ? '' : ''}">
                    <div class="timeline-content">
                        <div class="timeline-date">📅 ${event.date}</div>
                        <div class="timeline-title">${event.title}</div>
                        <div class="timeline-desc">${event.desc}</div>
                        <div class="timeline-category">${event.categorie}</div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ===== FILTRES =====
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderTimeline(currentFilter);
        });
    });

    // ===== LANCEMENT =====
    renderTimeline('all');
</script>
</body>
</html>
