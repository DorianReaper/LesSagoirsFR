<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavoirsFR · Quiz aléatoire</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0F172A;font-family:'Inter',sans-serif;padding:40px 20px;color:#F1F5F9}
        .container{max-width:800px;margin:0 auto}
        h1{color:#F59E0B;text-align:center;margin-bottom:10px}
        .sub{text-align:center;color:#94A3B8;margin-bottom:30px}
        .question-card{background:#1E293B;border-radius:24px;padding:30px;margin-bottom:20px;border-left:4px solid #F59E0B}
        .question-text{font-size:1.3rem;font-weight:600;margin-bottom:20px}
        .option{background:#334155;padding:14px 18px;border-radius:12px;margin:8px 0;cursor:pointer;transition:.2s}
        .option:hover{background:#F59E0B;color:#0F172A}
        .option.selected{background:#F59E0B;color:#0F172A}
        .feedback{margin-top:15px;padding:12px;border-radius:12px;font-weight:500}
        .feedback.correct{background:#10B981;color:#fff}
        .feedback.wrong{background:#EF4444;color:#fff}
        .next-btn{background:#F59E0B;color:#0F172A;border:none;padding:14px 32px;border-radius:40px;font-weight:600;cursor:pointer;margin-top:20px;width:100%}
        .next-btn:hover{background:#D97706}
        .result{text-align:center;margin-top:20px;padding:20px;background:#F59E0B20;border-radius:20px}
        .back-link{display:inline-block;background:#F59E0B;color:#0F172A;text-decoration:none;padding:10px 24px;border-radius:40px;margin-bottom:20px;font-weight:600;transition:.2s}
        .back-link:hover{background:#D97706}
        .back-link i{margin-right:8px}
        .retry-btn{background:#F59E0B;color:#0F172A;border:none;padding:10px 24px;border-radius:40px;font-weight:600;cursor:pointer;margin-top:10px}
        .retry-btn:hover{background:#D97706}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au menu principal</a>
    <h1><i class="fas fa-dice-d6"></i> Quiz aléatoire</h1>
    <div class="sub" id="status">Question 1 / 5</div>
    <div id="quizContainer"></div>
</div>
<script>
    let QUIZ_QUESTIONS_BASE = [];
    try {
        const stored = localStorage.getItem('savoirs_quiz_questions');
        if (stored) {
            QUIZ_QUESTIONS_BASE = JSON.parse(stored);
        } else {
            QUIZ_QUESTIONS_BASE = [
                { question: "Quand a commencé la Première Guerre mondiale ?", options: ["1914","1939","1815"], correct: 0, explication: "L'assassinat de François-Ferdinand a eu lieu en 1914." },
                { question: "Quel empereur a créé le Code civil ?", options: ["Louis XIV","Napoléon","Charlemagne"], correct: 1, explication: "Napoléon en 1804." },
                { question: "Où se trouve la Tour Eiffel ?", options: ["Lyon","Marseille","Paris"], correct: 2, explication: "À Paris, construite pour l'Exposition universelle de 1889." },
                { question: "Qui a écrit 'Les Misérables' ?", options: ["Zola","Hugo","Flaubert"], correct: 1, explication: "Victor Hugo en 1862." },
                { question: "Quel est le symbole chimique de l'or ?", options: ["Au","Ag","Fe"], correct: 0, explication: "Au vient du latin 'aurum'." }
            ];
        }
    } catch(e) {
        console.log("Erreur:", e);
    }

    let shuffled = [...QUIZ_QUESTIONS_BASE];
    for(let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    let questions = shuffled.slice(0, 5);
    let currentIndex = 0;
    let userAnswers = [];
    let quizFinished = false;
    
    function renderQuestion() {
        if (quizFinished) {
            let score = 0;
            questions.forEach((q, i) => { if (userAnswers[i] === q.correct) score++; });
            let percent = Math.round((score / questions.length) * 100);
            let message = percent === 100 ? '🎉 PARFAIT !' : (percent >= 80 ? '🌟 Excellent !' : (percent >= 60 ? '📚 Bien joué !' : '💪 Rejouez !'));
            let html = '<div class="result"><h3><i class="fas fa-trophy"></i> Résultat final</h3><p style="font-size:2rem;">' + score + ' / ' + questions.length + '</p><p>' + message + '</p><button class="retry-btn" onclick="window.location.reload()"><i class="fas fa-redo-alt"></i> Rejouer</button></div>';
            questions.forEach((q, i) => {
                let isOk = (userAnswers[i] === q.correct);
                html += '<div style="margin:12px 0;padding:12px;background:#1E293B;border-radius:16px;">';
                html += '<strong>' + (i+1) + '. ' + q.question + '</strong><br>';
                html += '<span style="color:#10B981">✅ Bonne réponse : ' + q.options[q.correct] + '</span><br>';
                html += '<span style="color:#F59E0B">📘 ' + q.explication + '</span><br>';
                if (!isOk) {
                    html += '<span style="color:#ef4444">❌ Ta réponse : ' + (userAnswers[i] !== undefined ? q.options[userAnswers[i]] : 'rien') + '</span><br>';
                } else {
                    html += '<span style="color:#10b981">⭐ Bravo !</span>';
                }
                html += '</div>';
            });
            document.getElementById('quizContainer').innerHTML = html;
            document.getElementById('status').innerHTML = '🎉 Quiz terminé';
            return;
        }
        
        let q = questions[currentIndex];
        let html = '<div class="question-card"><div class="question-text">' + (currentIndex+1) + '. ' + q.question + '</div><div class="options">';
        q.options.forEach((opt, idx) => {
            let isSelected = (userAnswers[currentIndex] === idx);
            html += '<div class="option ' + (isSelected ? 'selected' : '') + '" data-opt="' + idx + '">' + opt + '</div>';
        });
        html += '</div>';
        if (userAnswers[currentIndex] !== undefined) {
            let isCorrect = (userAnswers[currentIndex] === q.correct);
            html += '<div class="feedback ' + (isCorrect ? 'correct' : 'wrong') + '">';
            html += isCorrect ? '✅ Bonne réponse !' : '❌ Mauvaise réponse. La bonne réponse était : ' + q.options[q.correct];
            html += '</div>';
        }
        html += '<button class="next-btn" id="nextBtn">' + (currentIndex === questions.length-1 ? '🏁 Voir mon score' : '➡️ Question suivante') + '</button></div>';
        
        document.getElementById('quizContainer').innerHTML = html;
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.onclick = function() {
                if (userAnswers[currentIndex] !== undefined) return;
                userAnswers[currentIndex] = parseInt(this.dataset.opt);
                renderQuestion();
            };
        });
        
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.onclick = () => {
                if (userAnswers[currentIndex] === undefined) { alert("Choisis une réponse !"); return; }
                if (currentIndex === questions.length - 1) quizFinished = true;
                else currentIndex++;
                renderQuestion();
            };
        }
        document.getElementById('status').innerHTML = 'Question ' + (currentIndex+1) + ' / ' + questions.length;
    }
    renderQuestion();
</script>
</body>
</html>
