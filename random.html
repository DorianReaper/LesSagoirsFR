<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SavoirsFR · Quiz aléatoire (100+ questions)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F172A;
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            color: #F1F5F9;
            min-height: 100vh;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        .back-btn {
            background: #F59E0B;
            color: #0F172A;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .back-btn:hover {
            background: #D97706;
            transform: translateX(-4px);
        }

        h1 {
            color: #F59E0B;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .sub {
            text-align: center;
            color: #94A3B8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1E293B;
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .stats span {
            font-weight: 500;
        }

        .stats .progress {
            color: #F59E0B;
        }

        .question-card {
            background: #1E293B;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            border-left: 4px solid #F59E0B;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .question-category {
            display: inline-block;
            background: #334155;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #94A3B8;
            margin-bottom: 16px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 600px) {
            .options {
                grid-template-columns: 1fr;
            }
        }

        .option {
            background: #334155;
            padding: 14px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            font-size: 1rem;
        }

        .option:hover:not(.disabled) {
            background: #F59E0B;
            color: #0F172A;
            transform: translateX(4px);
        }

        .option.selected {
            background: #F59E0B;
            color: #0F172A;
            border-color: #F59E0B;
        }

        .option.correct {
            background: #10B981;
            color: white;
            border-color: #10B981;
        }

        .option.wrong {
            background: #EF4444;
            color: white;
            border-color: #EF4444;
        }

        .option.disabled {
            cursor: default;
        }

        .feedback {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            font-weight: 500;
            animation: fadeIn 0.3s;
        }

        .feedback.correct {
            background: #10B98120;
            border: 1px solid #10B981;
            color: #10B981;
        }

        .feedback.wrong {
            background: #EF444420;
            border: 1px solid #EF4444;
            color: #EF4444;
        }

        .next-btn {
            background: #F59E0B;
            color: #0F172A;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .next-btn:hover {
            background: #D97706;
            transform: scale(1.01);
        }

        .result-container {
            background: #1E293B;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid #334155;
        }

        .result-score {
            font-size: 4rem;
            font-weight: 800;
            color: #F59E0B;
            margin: 20px 0;
        }

        .result-message {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .result-details {
            text-align: left;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .result-details .detail-item {
            padding: 10px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-details .detail-item .status {
            font-weight: 700;
        }

        .result-details .detail-item .status.correct {
            color: #10B981;
        }

        .result-details .detail-item .status.wrong {
            color: #EF4444;
        }

        .result-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .result-buttons button {
            background: #F59E0B;
            color: #0F172A;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-buttons button:hover {
            background: #D97706;
            transform: scale(1.02);
        }

        .result-buttons .secondary-btn {
            background: #334155;
            color: white;
        }

        .result-buttons .secondary-btn:hover {
            background: #475569;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1E293B;
        }

        ::-webkit-scrollbar-thumb {
            background: #F59E0B;
            border-radius: 10px;
        }
    </style>
</head>

        { question: "Qui a remporté la Coupe du Monde 1998 ?", options: ["Brésil", "France", "Italie", "Allemagne"], correct: 1, categorie: "Sport", explication: "France bat Brésil 3-0." },

    // ==================== LOGIQUE DU QUIZ ====================
    let questions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let score = 0;
    let answered = false;
    let totalQuestions = 10; // Nombre de questions par session

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initQuiz() {
        const shuffled = shuffleArray([...ALL_QUESTIONS]);
        questions = shuffled.slice(0, totalQuestions);
        currentIndex = 0;
        userAnswers = new Array(questions.length).fill(null);
        score = 0;
        answered = false;
        document.getElementById('totalNum').innerText = questions.length;
        renderQuestion();
    }

    function renderQuestion() {
        if (currentIndex >= questions.length) {
            showResults();
            return;
        }

        const q = questions[currentIndex];
        document.getElementById('currentNum').innerText = currentIndex + 1;
        document.getElementById('scoreNum').innerText = score;

        let html = `
            <div class="question-card">
                <div class="question-category">📂 ${q.categorie}</div>
                <div class="question-text">${q.question}</div>
                <div class="options">
        `;

        q.options.forEach((opt, idx) => {
            let cls = 'option';
            if (userAnswers[currentIndex] !== null) {
                cls += ' disabled';
                if (idx === q.correct) cls += ' correct';
                if (userAnswers[currentIndex] === idx && idx !== q.correct) cls += ' wrong';
                if (userAnswers[currentIndex] === idx) cls += ' selected';
            }
            html += `<div class="${cls}" data-opt="${idx}">${opt}</div>`;
        });

        html += `</div>`;

        if (userAnswers[currentIndex] !== null) {
            const isCorrect = userAnswers[currentIndex] === q.correct;
            html += `
                <div class="feedback ${isCorrect ? 'correct' : 'wrong'}">
                    ${isCorrect ? '✅ ' : '❌ '} ${q.explication}
                </div>
            `;
            html += `<button class="next-btn" id="nextBtn">${currentIndex === questions.length - 1 ? '🏁 Voir mes résultats' : '➡️ Question suivante'}</button>`;
        }

        html += `</div>`;
        document.getElementById('questionArea').innerHTML = html;

        // Événements pour les options
        if (userAnswers[currentIndex] === null) {
            document.querySelectorAll('.option').forEach(el => {
                el.addEventListener('click', function() {
                    const optIdx = parseInt(this.dataset.opt);
                    userAnswers[currentIndex] = optIdx;
                    if (optIdx === q.correct) score++;
                    renderQuestion();
                });
            });
        }

        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', function() {
                if (userAnswers[currentIndex] === null) {
                    alert("Veuillez sélectionner une réponse !");
                    return;
                }
                currentIndex++;
                renderQuestion();
            });
        }
    }

    function showResults() {
        const percent = Math.round((score / questions.length) * 100);
        let message = '';
        if (percent === 100) message = '🎉 PARFAIT ! Vous êtes un génie ! 🎉';
        else if (percent >= 80) message = '🌟 Excellent ! Vous maîtrisez le sujet ! 🌟';
        else if (percent >= 60) message = '📚 Bien joué ! Continuez à apprendre ! 📚';
        else message = '💪 Rejouez pour améliorer votre score ! 💪';

        let detailsHtml = '';
        questions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.correct;
            detailsHtml += `
                <div class="detail-item">
                    <span>${i+1}. ${q.question.substring(0, 40)}${q.question.length > 40 ? '...' : ''}</span>
                    <span class="status ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✅' : '❌'}</span>
                </div>
            `;
        });

        const html = `
            <div class="result-container">
                <h2>🏆 Résultat final</h2>
                <div class="result-score">${score} / ${questions.length}</div>
                <div class="result-message">${message}</div>
                <div class="result-details">${detailsHtml}</div>
                <div class="result-buttons">
                    <button onclick="initQuiz()">🔄 Rejouer</button>
                    <button class="secondary-btn" onclick="window.location.href='index.html'">🏠 Retour au menu</button>
                </div>
            </div>
        `;
        document.getElementById('questionArea').innerHTML = html;
    }

    // Lancer le quiz
    initQuiz();
</script>
</body>
</html>
